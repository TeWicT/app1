services:
  db:
    image: postgres:15
    container_name: app1_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: app1
      POSTGRES_USER: app1user
      POSTGRES_PASSWORD: app1pass
    volumes:
      - app1_pg_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: app1_web
    restart: unless-stopped
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      CHANNEL_USE_REDIS: "True"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_DB: "0"
    expose:
      - "8000"
    volumes:
      - app1_static:/app/staticfiles
      - ./media:/app/media  

  redis:
    image: redis:7-alpine
    container_name: app1_redis
    restart: unless-stopped
    volumes:
      - app1_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]

  nginx:
    image: nginx:1.27-alpine
    container_name: app1_nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - app1_static:/app/staticfiles:ro
      - ./media:/app/media:ro 

volumes:
  app1_pg_data:
  app1_static:
  app1_redis_data:


